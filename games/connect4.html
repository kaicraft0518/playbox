<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四目並べ — Playbox</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f5f2;--surface:#ffffff;--surface2:#f0f0ec;
  --border:#e2e2dc;--text:#1a1a18;--text2:#6b6b63;
  --accent:#2a6b52;--accent-bg:rgba(42,107,82,0.08);
  --accent2:#c0392b;--shadow:0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.10);
  --radius:10px;--radius-sm:6px;--transition:0.2s ease;
}
:root.dark {
  --bg:#0a0a0f;--surface:#0f0f1a;--surface2:#15151f;
  --border:#1e1e3a;--text:#e0e0ff;--text2:#5a5a8a;
  --accent:#00c49a;--accent-bg:rgba(0,196,154,0.08);
  --accent2:#ff3c6e;--shadow:0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background var(--transition),color var(--transition);touch-action:manipulation;}
.pb-nav{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);}
.pb-nav-inner{display:flex;align-items:center;height:56px;gap:12px;max-width:960px;margin:0 auto;padding:0 20px;min-width:0;}
.pb-logo{font-family:'Fraunces',serif;font-weight:700;font-size:1.25rem;color:var(--text);text-decoration:none;letter-spacing:-0.02em;white-space:nowrap;}
.pb-logo span{color:var(--accent);}
.pb-nav-spacer{flex:1;}
.pb-icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:all var(--transition);flex-shrink:0;}
.pb-icon-btn:hover{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.pb-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;transition:all var(--transition);white-space:nowrap;}
.pb-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.pb-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.pb-btn.primary:hover{opacity:0.88;}
.pb-seg{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.pb-seg-btn{flex:1;padding:6px 10px;background:transparent;border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all var(--transition);white-space:nowrap;}
.pb-seg-btn+.pb-seg-btn{border-left:1px solid var(--border);}
.pb-seg-btn.active{background:var(--accent);color:white;}
.pb-seg-btn:not(.active):hover{background:var(--accent-bg);color:var(--accent);}

.game-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 16px 48px;gap:12px;}
.game-header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.game-title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;letter-spacing:-0.02em;}
.selectors{width:100%;max-width:480px;display:flex;flex-direction:column;gap:8px;}
.sel-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sel-label{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text2);letter-spacing:0.12em;text-transform:uppercase;min-width:40px;flex-shrink:0;}
.score-bar{width:100%;max-width:480px;display:flex;align-items:center;gap:8px;}
.score-card{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;transition:border-color 0.2s,box-shadow 0.2s;}
.score-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg);}
.score-card.active.p1{border-color:#f97316;}
.score-card.active.p2{border-color:#3b82f6;}
.disc-preview{width:26px;height:26px;border-radius:50%;flex-shrink:0;}
.disc-preview.p1{background:radial-gradient(circle at 35% 35%,#ffb347,#f97316);}
.disc-preview.p2{background:radial-gradient(circle at 35% 35%,#93c5fd,#3b82f6);}
.score-name{font-size:0.75rem;font-weight:600;color:var(--text2);}
.score-num{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;color:var(--text);line-height:1;}
.score-vs{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text2);}
.turn-bar{width:100%;max-width:480px;text-align:center;}
.turn-text{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text2);letter-spacing:0.1em;}
.board-outer{width:100%;max-width:480px;position:relative;}
.col-hints{display:flex;width:100%;margin-bottom:4px;padding:0 8px;}
.col-hint{flex:1;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:transparent;transition:color 0.15s;cursor:pointer;border-radius:4px;}
.col-hint.active{color:var(--accent);}
.board{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:8px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;gap:5px;position:relative;}
.board-row{display:flex;gap:5px;}
.cell{flex:1;aspect-ratio:1;border-radius:50%;background:var(--surface2);border:2px solid var(--border);position:relative;cursor:pointer;transition:background 0.1s,border-color 0.1s,transform 0.1s;overflow:hidden;}
.cell:hover{border-color:var(--accent);background:var(--accent-bg);}
.cell.p1{background:radial-gradient(circle at 35% 35%,#ffb347,#f97316);border-color:#ea580c;cursor:default;}
.cell.p2{background:radial-gradient(circle at 35% 35%,#93c5fd,#3b82f6);border-color:#2563eb;cursor:default;}
.cell.win{animation:winPulse 0.6s ease infinite alternate;}
@keyframes winPulse{from{transform:scale(1);box-shadow:none;}to{transform:scale(1.08);box-shadow:0 0 12px rgba(245,158,11,0.6);}}
.cell.drop{animation:dropIn 0.25s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes dropIn{from{transform:scaleY(0);transform-origin:top;}to{transform:scaleY(1);}}
.thinking-bar{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;display:none;align-items:center;gap:10px;}
.thinking-bar.show{display:flex;}
.thinking-dots{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--accent);letter-spacing:0.15em;animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
.result-overlay{display:none;position:fixed;inset:0;background:rgba(245,245,242,0.93);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:20px;}
:root.dark .result-overlay{background:rgba(10,10,15,0.92);}
.result-overlay.show{display:flex;}
.result-emoji{font-size:3rem;}
.result-title{font-family:'Fraunces',serif;font-size:2rem;font-weight:700;letter-spacing:-0.02em;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
.result-sub{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text2);letter-spacing:0.08em;}

/* Online */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:16px;box-shadow:var(--shadow-lg);}
.modal-title{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;color:var(--text);}
.modal-sub{font-size:0.78rem;color:var(--text2);line-height:1.6;}
.match-tabs{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.match-tab{flex:1;padding:8px 6px;background:transparent;border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;transition:all var(--transition);white-space:nowrap;}
.match-tab+.match-tab{border-left:1px solid var(--border);}
.match-tab.active{background:var(--accent);color:#fff;}
.match-panel{display:none;flex-direction:column;gap:10px;}
.match-panel.show{display:flex;}
.room-code-display{font-family:'DM Mono',monospace;font-size:2.2rem;font-weight:700;color:var(--accent);letter-spacing:0.2em;text-align:center;padding:16px;background:var(--accent-bg);border-radius:var(--radius);border:1px solid var(--accent);}
.room-code-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;font-size:1.4rem;letter-spacing:0.2em;text-align:center;text-transform:uppercase;outline:none;transition:border-color 0.2s;}
.room-code-input:focus{border-color:var(--accent);}
.match-status{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text2);text-align:center;letter-spacing:0.1em;}
.match-status.ok{color:var(--accent);}
.match-status.err{color:var(--accent2);}
.url-display{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;word-break:break-all;cursor:pointer;}
.url-display:hover{border-color:var(--accent);color:var(--accent);}
.online-status-bar{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:8px 14px;display:none;align-items:center;justify-content:space-between;gap:8px;}
.online-status-bar.show{display:flex;}
.online-status-text{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--accent);letter-spacing:0.08em;}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 1.5s ease infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>
<body>

<nav class="pb-nav">
  <div class="pb-nav-inner">
    <a href="../index.html" class="pb-logo">Play<span>box</span></a>
    <div class="pb-nav-spacer"></div>
    <button class="pb-icon-btn" id="themeBtn" onclick="toggleTheme()">🌤</button>
  </div>
</nav>

<div class="game-wrap">
  <div class="game-header">
    <div class="game-title">四目並べ</div>
    <button class="pb-btn primary" onclick="newGame()">▶ NEW</button>
  </div>

  <div class="selectors">
    <div class="sel-row">
      <span class="sel-label">モード</span>
      <div class="pb-seg" id="modeSeg">
        <button class="pb-seg-btn active" onclick="setMode('cpu')">🤖 CPU</button>
        <button class="pb-seg-btn" onclick="setMode('2p')">👥 2人</button>
        <button class="pb-seg-btn" onclick="setMode('online')">🌐 オンライン</button>
      </div>
    </div>
    <div class="sel-row" id="cpuRow">
      <span class="sel-label">強さ</span>
      <div class="pb-seg" id="cpuSeg">
        <button class="pb-seg-btn" onclick="setCPU(0)">弱</button>
        <button class="pb-seg-btn active" onclick="setCPU(1)">中</button>
        <button class="pb-seg-btn" onclick="setCPU(2)">強</button>
        <button class="pb-seg-btn" onclick="setCPU(3)">超強</button>
        <button class="pb-seg-btn" onclick="setCPU(4)">最強</button>
      </div>
    </div>
  </div>

  <div class="online-status-bar" id="onlineStatusBar">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="online-dot"></div>
      <span class="online-status-text" id="onlineStatusText">接続中…</span>
    </div>
    <button class="pb-btn" style="padding:4px 10px;font-size:0.72rem;" onclick="leaveRoom()">退出</button>
  </div>

  <div class="score-bar">
    <div class="score-card" id="cardP1">
      <div class="disc-preview p1"></div>
      <div class="score-info">
        <div class="score-name" id="nameP1">あなた</div>
        <div class="score-num" id="scoreP1">0</div>
      </div>
    </div>
    <div class="score-vs">VS</div>
    <div class="score-card" id="cardP2">
      <div class="disc-preview p2"></div>
      <div class="score-info">
        <div class="score-name" id="nameP2">CPU（中）</div>
        <div class="score-num" id="scoreP2">0</div>
      </div>
    </div>
  </div>

  <div class="turn-bar"><div class="turn-text" id="turnText">🟠 あなたの番</div></div>

  <div class="board-outer">
    <div class="col-hints" id="colHints"></div>
    <div class="board" id="board"></div>
  </div>

  <div class="thinking-bar" id="thinkingBar">
    <span class="thinking-dots">● ● ●</span>
    <span style="font-size:0.78rem;color:var(--text2);">CPUが考えています…</span>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-emoji" id="resEmoji"></div>
  <div class="result-title" id="resTitle"></div>
  <div class="result-sub" id="resSub"></div>
  <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center;">
    <button class="pb-btn" onclick="document.getElementById('resultOverlay').classList.remove('show')">閉じる</button>
    <button class="pb-btn primary" onclick="newGame();document.getElementById('resultOverlay').classList.remove('show')">もう一度</button>
  </div>
</div>

<!-- Online Modal -->
<div class="modal-overlay" id="matchModal">
  <div class="modal-box">
    <div class="modal-title">🌐 オンライン対戦</div>
    <div class="match-tabs">
      <button class="match-tab active" onclick="switchMatchTab('create')">ルームを作る</button>
      <button class="match-tab" onclick="switchMatchTab('join')">コードで入る</button>
      <button class="match-tab" onclick="switchMatchTab('random')">ランダム</button>
    </div>
    <div class="match-panel show" id="panelCreate">
      <div class="modal-sub">ルームを作成してコードを友達に教えてください。</div>
      <div class="room-code-display" id="createdCode">----</div>
      <div class="url-display" id="shareUrl" onclick="copyUrl()" title="クリックでコピー">URLを生成中…</div>
      <div class="match-status" id="createStatus">相手の入室を待っています…</div>
      <button class="pb-btn" onclick="closeMatchModal()">キャンセル</button>
    </div>
    <div class="match-panel" id="panelJoin">
      <div class="modal-sub">4桁のルームコードを入力してください。</div>
      <input class="room-code-input" id="joinCodeInput" maxlength="4" placeholder="ABCD" oninput="this.value=this.value.toUpperCase()">
      <div class="match-status" id="joinStatus"></div>
      <div style="display:flex;gap:8px;">
        <button class="pb-btn primary" onclick="joinByCode()">入室する</button>
        <button class="pb-btn" onclick="closeMatchModal()">キャンセル</button>
      </div>
    </div>
    <div class="match-panel" id="panelRandom">
      <div class="modal-sub">空きルームを自動で探します。見つからない場合は新しく作成します。</div>
      <div class="match-status" id="randomStatus">ボタンを押してマッチングを開始</div>
      <div style="display:flex;gap:8px;">
        <button class="pb-btn primary" onclick="startRandom()">🔍 マッチング開始</button>
        <button class="pb-btn" onclick="closeMatchModal()">キャンセル</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, update, onValue, off, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const app = initializeApp({apiKey:"AIzaSyC2Jm2dzBBu6jWjAGVFda9V86SQKPObNAU",authDomain:"playbox-database.firebaseapp.com",databaseURL:"https://playbox-database-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"playbox-database",storageBucket:"playbox-database.firebasestorage.app",messagingSenderId:"608200798614",appId:"1:608200798614:web:2ecc32e71ba54e06e3edb7"});
const db = getDatabase(app);
window._fb = { db, ref, set, get, update, onValue, off, remove };

<script>
const ROWS=6,COLS=7,P1=1,P2=-1,EMPTY=0;
const CPU_DEPTHS=[2,3,5,7,9];
let gameMode='cpu',cpuLevel=1,scoreP1=0,scoreP2=0;
let board=[],current=P1,gameOver=false,thinking=false,winCells=[],hoverCol=-1;
let onlineRoomId=null,onlineMyPlayer=null,onlineListener=null,fbReady=false;

window.addEventListener('fb-ready',()=>{fbReady=true;checkUrlRoom();});

function checkUrlRoom(){const p=new URLSearchParams(location.search);const c=p.get('room');if(c){openMatchModal();switchMatchTab('join');document.getElementById('joinCodeInput').value=c.toUpperCase();setTimeout(joinByCode,500);}}

function setMode(m){
  if(m==='online'){openMatchModal();return;}
  if(gameMode==='online')leaveRoom();
  gameMode=m;
  document.querySelectorAll('#modeSeg .pb-seg-btn').forEach((b,i)=>b.classList.toggle('active',['cpu','2p','online'][i]===m));
  document.getElementById('cpuRow').style.display=m==='cpu'?'':'none';
  document.getElementById('onlineStatusBar').classList.remove('show');
  updateNames();newGame();
}
function setCPU(lvl){cpuLevel=lvl;document.querySelectorAll('#cpuSeg .pb-seg-btn').forEach((b,i)=>b.classList.toggle('active',i===lvl));const n=['弱','中','強','超強','最強'];document.getElementById('nameP2').textContent=`CPU（${n[lvl]}）`;newGame();}
function updateNames(){
  const n=['弱','中','強','超強','最強'];
  if(gameMode==='cpu'){document.getElementById('nameP1').textContent='あなた';document.getElementById('nameP2').textContent=`CPU（${n[cpuLevel]}）`;}
  else if(gameMode==='online'){document.getElementById('nameP1').textContent=onlineMyPlayer===P1?'あなた':'相手';document.getElementById('nameP2').textContent=onlineMyPlayer===P2?'あなた':'相手';}
  else{document.getElementById('nameP1').textContent='プレイヤー1 🟠';document.getElementById('nameP2').textContent='プレイヤー2 🔵';}
}

function newGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(EMPTY));
  current=P1;gameOver=false;thinking=false;winCells=[];hoverCol=-1;
  document.getElementById('thinkingBar').classList.remove('show');
  document.getElementById('resultOverlay').classList.remove('show');
  updateNames();renderBoard();updateTurnText();updateScoreCards();
  if(gameMode==='online'&&onlineRoomId)pushOnlineState();
}

function getRow(b,col){for(let r=ROWS-1;r>=0;r--)if(b[r][col]===EMPTY)return r;return -1;}
function dropDisc(b,col,player){const r=getRow(b,col);if(r===-1)return null;const nb=b.map(row=>[...row]);nb[r][col]=player;return nb;}
function getValidCols(b){return Array.from({length:COLS},(_,c)=>c).filter(c=>getRow(b,c)!==-1);}
function checkWin(b,player){
  for(let r=0;r<ROWS;r++)for(let c=0;c<=COLS-4;c++)if([0,1,2,3].every(i=>b[r][c+i]===player))return[[r,c],[r,c+1],[r,c+2],[r,c+3]];
  for(let r=0;r<=ROWS-4;r++)for(let c=0;c<COLS;c++)if([0,1,2,3].every(i=>b[r+i][c]===player))return[[r,c],[r+1,c],[r+2,c],[r+3,c]];
  for(let r=0;r<=ROWS-4;r++)for(let c=0;c<=COLS-4;c++)if([0,1,2,3].every(i=>b[r+i][c+i]===player))return[[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]];
  for(let r=0;r<=ROWS-4;r++)for(let c=3;c<COLS;c++)if([0,1,2,3].every(i=>b[r+i][c-i]===player))return[[r,c],[r+1,c-1],[r+2,c-2],[r+3,c-3]];
  return null;
}
function isFull(b){return b[0].every(c=>c!==EMPTY);}

function evaluate(b,player){
  let score=0;const cc=Math.floor(COLS/2);for(let r=0;r<ROWS;r++)if(b[r][cc]===player)score+=3;
  for(const[dr,dc]of[[0,1],[1,0],[1,1],[1,-1]])for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const w=[];for(let i=0;i<4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)w.push(b[nr][nc]);}if(w.length===4)score+=scoreW(w,player);}
  if(cpuLevel===0)return Math.random()*40-20;if(cpuLevel===1)return score+(Math.random()*12-6);if(cpuLevel===2)return score+(Math.random()*4-2);return score;
}
function scoreW(w,p){const o=-p,m=w.filter(c=>c===p).length,e=w.filter(c=>c===EMPTY).length,t=w.filter(c=>c===o).length;if(m===4)return 100;if(m===3&&e===1)return 5;if(m===2&&e===2)return 2;if(t===3&&e===1)return -4;return 0;}
function minimax(b,depth,alpha,beta,isMax,cp){
  const w1=checkWin(b,cp),w2=checkWin(b,-cp);
  if(w1)return 1000+depth;if(w2)return-1000-depth;if(isFull(b)||depth===0)return evaluate(b,cp);
  const cols=getValidCols(b);
  if(isMax){let best=-Infinity;for(const c of cols){const nb=dropDisc(b,c,cp);best=Math.max(best,minimax(nb,depth-1,alpha,beta,false,cp));alpha=Math.max(alpha,best);if(beta<=alpha)break;}return best;}
  else{let best=Infinity;for(const c of cols){const nb=dropDisc(b,c,-cp);best=Math.min(best,minimax(nb,depth-1,alpha,beta,true,cp));beta=Math.min(beta,best);if(beta<=alpha)break;}return best;}
}
function getBestMove(b,player){
  const cols=getValidCols(b);if(!cols.length)return -1;if(cpuLevel===0)return cols[Math.floor(Math.random()*cols.length)];
  let bv=-Infinity,bc=cols[0];const d=CPU_DEPTHS[cpuLevel];
  for(const c of cols){const nb=dropDisc(b,c,player);const v=minimax(nb,d-1,-Infinity,Infinity,false,player);if(v>bv){bv=v;bc=c;}}return bc;
}

function onColClick(col){
  if(gameOver||thinking)return;
  if(gameMode==='cpu'&&current!==P1)return;
  if(gameMode==='online'&&current!==onlineMyPlayer)return;
  if(getRow(board,col)===-1)return;
  placeDisc(col);
}

function placeDisc(col){
  const row=getRow(board,col);if(row===-1)return;
  board[row][col]=current;const player=current;current=-current;
  renderBoard(row,col);updateTurnText();
  if(gameMode==='online')pushOnlineState();
  const win=checkWin(board,player);
  if(win){winCells=win;setTimeout(()=>{renderBoard();endGame(player);},300);return;}
  if(isFull(board)){setTimeout(()=>endGame(0),300);return;}
  if(gameMode==='cpu'&&current===P2)setTimeout(doCPUMove,100);
}

function doCPUMove(){
  if(gameOver||thinking)return;thinking=true;
  document.getElementById('thinkingBar').classList.add('show');
  setTimeout(()=>{document.getElementById('thinkingBar').classList.remove('show');thinking=false;const col=getBestMove(board,P2);if(col!==-1)placeDisc(col);},300+cpuLevel*150);
}

function endGame(winner){
  gameOver=true;let emoji,title,sub;
  if(winner===P1){scoreP1++;document.getElementById('scoreP1').textContent=scoreP1;
    if(gameMode==='online'){emoji='🏆';title=onlineMyPlayer===P1?'あなたの勝ち！':'相手の勝ち';}
    else if(gameMode==='cpu'){emoji='🏆';title='あなたの勝ち！';}else{emoji='🏆';title='プレイヤー1の勝ち！';}
    sub=`スコア：${scoreP1} — ${scoreP2}`;
  }else if(winner===P2){scoreP2++;document.getElementById('scoreP2').textContent=scoreP2;
    if(gameMode==='online'){emoji='🏆';title=onlineMyPlayer===P2?'あなたの勝ち！':'相手の勝ち';}
    else if(gameMode==='cpu'){emoji='😞';title='CPUの勝ち';}else{emoji='🏆';title='プレイヤー2の勝ち！';}
    sub=`スコア：${scoreP1} — ${scoreP2}`;
  }else{emoji='🤝';title='引き分け！';sub='盤面が埋まりました';}
  document.getElementById('resEmoji').textContent=emoji;document.getElementById('resTitle').textContent=title;document.getElementById('resSub').textContent=sub;
  setTimeout(()=>document.getElementById('resultOverlay').classList.add('show'),500);updateScoreCards();
  if(gameMode==='online')pushOnlineState();
}

function renderBoard(lastRow=-1,lastCol=-1){
  const boardEl=document.getElementById('board');boardEl.innerHTML='';
  const winSet=new Set(winCells.map(([r,c])=>`${r},${c}`));
  for(let r=0;r<ROWS;r++){const row=document.createElement('div');row.className='board-row';
    for(let c=0;c<COLS;c++){const cell=document.createElement('div');const v=board[r][c];let cls='cell';
      if(v===P1)cls+=' p1';if(v===P2)cls+=' p2';if(winSet.has(`${r},${c}`))cls+=' win';if(r===lastRow&&c===lastCol)cls+=' drop';
      cell.className=cls;cell.addEventListener('click',()=>onColClick(c));cell.addEventListener('mouseenter',()=>{hoverCol=c;updateColHints();});row.appendChild(cell);}
    boardEl.appendChild(row);}
  boardEl.addEventListener('mouseleave',()=>{hoverCol=-1;updateColHints();});renderColHints();
}
function renderColHints(){const h=document.getElementById('colHints');h.innerHTML='';for(let c=0;c<COLS;c++){const d=document.createElement('div');d.className='col-hint'+(c===hoverCol?' active':'');d.textContent='▼';d.addEventListener('click',()=>onColClick(c));d.addEventListener('mouseenter',()=>{hoverCol=c;updateColHints();});h.appendChild(d);}}
function updateColHints(){const h=document.getElementById('colHints').children;for(let c=0;c<COLS;c++)h[c].className='col-hint'+(c===hoverCol?' active':'');}
function updateTurnText(){
  if(gameOver)return;const el=document.getElementById('turnText');
  if(gameMode==='online'){el.textContent=current===onlineMyPlayer?'🟠 あなたの番':'🔵 相手の番';}
  else if(gameMode==='cpu'){el.textContent=current===P1?'🟠 あなたの番':'🔵 CPUの番';}
  else{el.textContent=current===P1?'🟠 プレイヤー1の番':'🔵 プレイヤー2の番';}
}
function updateScoreCards(){document.getElementById('cardP1').className='score-card'+(!gameOver&&current===P1?' active p1':'');document.getElementById('cardP2').className='score-card'+(!gameOver&&current===P2?' active p2':'');}

// ── ONLINE ──────────────────────────────────────────────
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');}
function openMatchModal(){if(!fbReady){alert('Firebase接続中です。少し待ってください。');return;}document.getElementById('matchModal').classList.add('show');switchMatchTab('create');createRoom();}
function closeMatchModal(){document.getElementById('matchModal').classList.remove('show');if(!onlineRoomId)setMode('cpu');}
function switchMatchTab(t){document.querySelectorAll('.match-tab').forEach((b,i)=>b.classList.toggle('active',['create','join','random'][i]===t));document.querySelectorAll('.match-panel').forEach(p=>p.classList.remove('show'));document.getElementById(`panel${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.add('show');}

async function createRoom(){
  const code=genCode();document.getElementById('createdCode').textContent=code;
  const url=`${location.origin}${location.pathname}?room=${code}`;document.getElementById('shareUrl').textContent=url;
  document.getElementById('createStatus').textContent='相手の入室を待っています…';
  const{db,ref,set,onValue}=window._fb;const roomRef=ref(db,`connect4_rooms/${code}`);
  await set(roomRef,{status:'waiting',board:board.map(r=>[...r]),current:P1,gameOver:false,createdAt:Date.now()});
  onlineRoomId=code;onlineMyPlayer=P1;
  onValue(roomRef,snap=>{const d=snap.val();if(!d)return;if(d.status==='playing'&&d.guest){document.getElementById('createStatus').textContent='✓ 相手が入室しました！';setTimeout(()=>{closeMatchModal();activateOnlineMode();},800);}});
}

async function joinByCode(){
  const code=document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if(code.length!==4){document.getElementById('joinStatus').textContent='4文字のコードを入力してください';document.getElementById('joinStatus').className='match-status err';return;}
  const{db,ref,get,update}=window._fb;const roomRef=ref(db,`connect4_rooms/${code}`);
  const snap=await get(roomRef);
  if(!snap.exists()){document.getElementById('joinStatus').textContent='ルームが見つかりません';document.getElementById('joinStatus').className='match-status err';return;}
  const data=snap.val();
  if(data.status!=='waiting'){document.getElementById('joinStatus').textContent='このルームは既に満員です';document.getElementById('joinStatus').className='match-status err';return;}
  await update(roomRef,{status:'playing',guest:'p2'});
  onlineRoomId=code;onlineMyPlayer=P2;
  document.getElementById('joinStatus').textContent='✓ 入室しました！';document.getElementById('joinStatus').className='match-status ok';
  setTimeout(()=>{closeMatchModal();activateOnlineMode();},600);
}

async function startRandom(){
  const{db,ref,get}=window._fb;document.getElementById('randomStatus').textContent='空きルームを検索中…';
  const snap=await get(ref(db,'connect4_rooms'));let found=null;
  if(snap.exists())snap.forEach(child=>{if(!found&&child.val().status==='waiting'&&Date.now()-child.val().createdAt<120000)found=child.key;});
  if(found){document.getElementById('joinCodeInput').value=found;switchMatchTab('join');joinByCode();}
  else{document.getElementById('randomStatus').textContent='空きルームなし。新しく作成します…';switchMatchTab('create');createRoom();}
}

function activateOnlineMode(){
  gameMode='online';
  document.querySelectorAll('#modeSeg .pb-seg-btn').forEach((b,i)=>b.classList.toggle('active',i===2));
  document.getElementById('cpuRow').style.display='none';
  document.getElementById('onlineStatusBar').classList.add('show');
  document.getElementById('onlineStatusText').textContent=`ルーム: ${onlineRoomId} ｜ あなた: ${onlineMyPlayer===P1?'🟠 先手':'🔵 後手'}`;
  const url=new URL(location.href);url.searchParams.set('room',onlineRoomId);history.replaceState({},'',url);
  updateNames();
  const{db,ref,onValue}=window._fb;const roomRef=ref(db,`connect4_rooms/${onlineRoomId}`);
  onlineListener=onValue(roomRef,snap=>{
    const d=snap.val();if(!d){leaveRoom();return;}
    if(d.board){board=d.board.map(r=>[...r]);current=d.current;gameOver=d.gameOver||false;winCells=d.winCells||[];renderBoard();updateTurnText();updateScoreCards();
      if(d.gameOver&&d.winner!==undefined&&!document.getElementById('resultOverlay').classList.contains('show')){
        const w=d.winner;let emoji,title,sub='';
        if(w===P1){emoji='🏆';title=onlineMyPlayer===P1?'あなたの勝ち！':'相手の勝ち';}
        else if(w===P2){emoji='🏆';title=onlineMyPlayer===P2?'あなたの勝ち！':'相手の勝ち';}
        else{emoji='🤝';title='引き分け！';sub='盤面が埋まりました';}
        document.getElementById('resEmoji').textContent=emoji;document.getElementById('resTitle').textContent=title;document.getElementById('resSub').textContent=sub;
        setTimeout(()=>document.getElementById('resultOverlay').classList.add('show'),500);
      }
    }
  });
  if(onlineMyPlayer===P1)pushOnlineState();
}

function pushOnlineState(){
  if(!onlineRoomId||!window._fb)return;
  const{db,ref,update}=window._fb;
  const win=checkWin(board,P1)||checkWin(board,P2);
  const winner=win?checkWin(board,P1)?P1:P2:isFull(board)?0:null;
  update(ref(db,`connect4_rooms/${onlineRoomId}`),{board:board.map(r=>[...r]),current,gameOver,winCells:winCells,winner:winner});
}

function leaveRoom(){
  if(onlineRoomId&&window._fb){const{db,ref,remove}=window._fb;remove(ref(db,`connect4_rooms/${onlineRoomId}`));}
  onlineRoomId=null;onlineMyPlayer=null;onlineListener=null;
  const url=new URL(location.href);url.searchParams.delete('room');history.replaceState({},'',url);
  setMode('cpu');
}

function copyUrl(){const url=document.getElementById('shareUrl').textContent;navigator.clipboard.writeText(url).then(()=>{document.getElementById('shareUrl').textContent='✓ コピーしました！';setTimeout(()=>document.getElementById('shareUrl').textContent=url,2000);});}

function toggleTheme(){const d=document.documentElement.classList.toggle('dark');document.getElementById('themeBtn').textContent=d?'🌙':'🌤';localStorage.setItem('pb-theme',d?'dark':'light');}

(function(){const saved=localStorage.getItem('pb-theme');const dark=saved==='dark'||(!saved&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.classList.toggle('dark',dark);document.getElementById('themeBtn').textContent=dark?'🌙':'🌤';newGame();})();
</script>
